name: CI

on:
  pull_request:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  test:
    name: test w/ Python ${{ matrix.python-version }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "3.15-dev"]
        include:
          - { python-version: "3.9", nox-python-version: "3.9" }
          - { python-version: "3.10", nox-python-version: "3.10" }
          - { python-version: "3.11", nox-python-version: "3.11" }
          - { python-version: "3.12", nox-python-version: "3.12" }
          - { python-version: "3.13", nox-python-version: "3.13" }
          - { python-version: "3.14", nox-python-version: "3.14" }
          - { python-version: "3.15-dev", nox-python-version: "3.15" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: "!endsWith(matrix.python-version, '-dev')"
        with:
          python-version: ${{ matrix.python-version }}
      - uses: deadsnakes/action@e640ac8743173a67cca4d7d77cd837e514bf98e8 # v3.2.0
        if: endsWith(matrix.python-version, '-dev')
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install nox
      - run: nox --session tests-${{ matrix.nox-python-version }}
        env:
          PYTHONDEVMODE: 1
      - name: Annotate uncovered lines
        if: always()
        run: |
          python - <<'PY'
          import json
          import pathlib

          coverage_json = pathlib.Path("coverage.json")
          if not coverage_json.is_file():
              print(
                  "::warning::coverage.json not found; "
                  "this is expected if tests did not complete successfully"
              )
              raise SystemExit(0)

          coverage = json.loads(coverage_json.read_text())
          for filename, report in coverage["files"].items():
              for line in report.get("missing_lines", ()):
                  print(f"::warning file={filename},line={line}::Line is not covered by tests")
              for branch in report.get("missing_branches", ()):
                  message = f"Branch from line {branch[0]} to line {branch[1]} is not covered by tests"
                  print(f"::warning file={filename},line={branch[0]}::{message}")
          PY

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: pip install nox
      - run: nox --session lint
